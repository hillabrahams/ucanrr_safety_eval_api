<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>UCANRR Safety Console</title>
  <!-- Tailwind via CDN for quick, nice styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Simple fade-in animation */
    .fade-in {
      animation: fadeIn 0.25s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    pre {
      white-space: pre-wrap;
      word-wrap: break-word;
    }
  </style>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
  <div class="max-w-5xl mx-auto py-8 px-4">
    <!-- Header -->
    <header class="mb-6 flex items-center justify-between gap-4">
      <div>
        <h1 class="text-3xl font-bold text-slate-800">UCANRR Safety Console</h1>
        <p class="text-sm text-slate-500">
          Test your safety evaluation API with real or sample journal entries.
        </p>
      </div>
      <div class="text-xs text-right text-slate-500">
        API base URL:<br />
        <input id="apiBase" class="mt-1 px-2 py-1 border rounded w-52 text-xs"
               type="text"
			   value="https://ucanrr.ngrok-free.dev" 
        />
      </div>
    </header>

    <!-- Input panel -->
    <section class="grid md:grid-cols-2 gap-6 mb-6">
      <div class="bg-white rounded-2xl shadow p-4 md:p-5 flex flex-col">
        <h2 class="text-lg font-semibold mb-2">Journal Entry</h2>
        <textarea
          id="entryText"
          class="flex-1 w-full border rounded-xl p-3 text-sm mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
          rows="10"
          placeholder="Type or paste a journal entry here..."
        ></textarea>

        <div class="flex items-center justify-between gap-3 mb-3">
          <div class="flex-1">
            <label class="block text-xs text-slate-500 mb-1" for="userHash">
              User / Client ID (optional)
            </label>
            <input
              id="userHash"
              class="w-full border rounded-lg px-2 py-1 text-sm"
              type="text"
              placeholder="e.g., client-123"
            />
          </div>
          <div class="text-right mt-5">
            <button
              id="runButton"
              class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-blue-600 text-white text-sm font-medium hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed"
            >
              <span id="btnText">Run Safety Check</span>
              <svg id="btnSpinner" class="hidden animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor"
                      d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z">
                </path>
              </svg>
            </button>
          </div>
        </div>

        <p class="text-xs text-slate-400">
          This console sends your entry to
          <code class="bg-slate-100 px-1 rounded">POST /safety/analyze_entry</code>
          on the API base URL above.
        </p>
      </div>

      <!-- High-level result panel -->
      <div id="summaryPanel" class="bg-white rounded-2xl shadow p-4 md:p-5 hidden">
        <h2 class="text-lg font-semibold mb-2">Safety Assessment Summary</h2>
        <div id="summaryContent" class="space-y-3 text-sm"></div>
      </div>
    </section>

    <!-- Details: flags + recommendations -->
    <section id="detailsSection" class="grid md:grid-cols-2 gap-6 mb-6 hidden">
      <div class="bg-white rounded-2xl shadow p-4 md:p-5">
        <h3 class="text-base font-semibold mb-2">Flags</h3>
        <div id="flagsContent" class="text-sm space-y-1"></div>
      </div>

      <div class="bg-white rounded-2xl shadow p-4 md:p-5">
        <h3 class="text-base font-semibold mb-2">Recommendations</h3>
        <div id="recsContent" class="text-sm space-y-1"></div>
      </div>
    </section>

    <!-- Raw JSON -->
    <section id="rawSection" class="bg-white rounded-2xl shadow p-4 md:p-5 hidden mb-10">
      <div class="flex items-center justify-between mb-2">
        <h3 class="text-base font-semibold">Raw JSON Response</h3>
        <button
          id="toggleRawBtn"
          class="text-xs text-blue-600 hover:underline"
        >
          Collapse
        </button>
      </div>
      <pre id="rawJson" class="text-xs bg-slate-50 rounded-xl p-3 overflow-x-auto"></pre>
    </section>

    <!-- Error box -->
    <div id="errorBox" class="hidden mt-2 p-3 rounded-xl bg-red-50 text-red-700 text-sm border border-red-200"></div>
  </div>

  <script>
    const runButton = document.getElementById("runButton");
    const btnText = document.getElementById("btnText");
    const btnSpinner = document.getElementById("btnSpinner");
    const errorBox = document.getElementById("errorBox");
    const summaryPanel = document.getElementById("summaryPanel");
    const summaryContent = document.getElementById("summaryContent");
    const detailsSection = document.getElementById("detailsSection");
    const flagsContent = document.getElementById("flagsContent");
    const recsContent = document.getElementById("recsContent");
    const rawSection = document.getElementById("rawSection");
    const rawJson = document.getElementById("rawJson");
    const toggleRawBtn = document.getElementById("toggleRawBtn");
    const apiBaseInput = document.getElementById("apiBase");

    function setLoading(isLoading) {
      runButton.disabled = isLoading;
      btnSpinner.classList.toggle("hidden", !isLoading);
      btnText.textContent = isLoading ? "Evaluating..." : "Run Safety Check";
    }

    function riskColorClass(tier) {
      switch (tier) {
        case 0: return "bg-emerald-100 text-emerald-800 border border-emerald-200";
        case 1: return "bg-amber-100 text-amber-800 border border-amber-200";
        case 2: return "bg-orange-100 text-orange-800 border border-orange-200";
        case 3: return "bg-red-100 text-red-800 border border-red-200";
        default: return "bg-slate-100 text-slate-800 border border-slate-200";
      }
    }

    function riskLabel(tier, label) {
      if (label) return label;
      switch (tier) {
        case 0: return "normal";
        case 1: return "ambiguous monitor / heated";
        case 2: return "crisis";
        case 3: return "extreme abuse";
        default: return "unknown";
      }
    }

    function renderSummary(data) {
      const tier = data.risk_tier;
      const label = riskLabel(tier, data.risk_label);

      const badgeClass = riskColorClass(tier);
      const recs = data.recommendations || {};

      summaryContent.innerHTML = `
        <div class="fade-in flex items-center gap-3">
          <div class="px-3 py-1 rounded-full text-xs font-semibold inline-flex items-center gap-2 ${badgeClass}">
            <span>Risk Tier ${tier}</span>
            <span class="inline-block w-1 h-1 rounded-full bg-current opacity-60"></span>
            <span class="capitalize">${label}</span>
          </div>
        </div>
        <div class="mt-3 text-sm text-slate-600">
          <p><span class="font-medium">Partner share policy:</span> <code class="bg-slate-100 px-1 rounded">${recs.partner_share_policy ?? "n/a"}</code></p>
          <p><span class="font-medium">Therapist share policy:</span> <code class="bg-slate-100 px-1 rounded">${recs.therapist_share_policy ?? "n/a"}</code></p>
          <p><span class="font-medium">Suggested UI flow:</span> <code class="bg-slate-100 px-1 rounded">${recs.suggested_ui_flow ?? "n/a"}</code></p>
        </div>
        <div class="mt-3 text-xs text-slate-500">
          <p><strong>Crisis banner:</strong> ${recs.show_crisis_banner ? "Yes" : "No"}</p>
          <p><strong>Show crisis resources:</strong> ${recs.show_crisis_resources ? "Yes" : "No"}</p>
          <p><strong>Mark as urgent for therapist:</strong> ${recs.mark_as_urgent_for_therapist ? "Yes" : "No"}</p>
        </div>
        <div class="mt-3 pt-3 border-t border-slate-100">
          <p class="text-xs font-medium text-slate-500 mb-2">Legend</p>
          <div class="flex flex-wrap gap-2">
            ${[0,1,2,3].map(t => `
              <div class="px-3 py-1 rounded-full text-xs font-semibold inline-flex items-center gap-2 ${riskColorClass(t)}">
                <span>Risk Tier ${t}</span>
                <span class="inline-block w-1 h-1 rounded-full bg-current opacity-60"></span>
                <span class="capitalize">${riskLabel(t, null)}</span>
              </div>
            `).join('')}
          </div>
        </div>
      `;
      summaryPanel.classList.remove("hidden");
    }

    function renderFlags(flags) {
      if (!flags || typeof flags !== "object") {
        flagsContent.innerHTML = `<p class="text-slate-500 text-sm">No flags in response.</p>`;
        return;
      }
      let html = "";
      Object.keys(flags).forEach(key => {
        const value = flags[key];
        const label = key.replace(/_/g, " ");
        const valStr = typeof value === "boolean" ? (value ? "Yes" : "No") : String(value);
        html += `
          <div class="flex items-center justify-between border-b border-slate-100 py-1 last:border-b-0">
            <span class="text-slate-600">${label}</span>
            <span class="text-xs font-mono px-2 py-0.5 rounded-full ${
              value === true
                ? "bg-red-100 text-red-700"
                : value === false
                  ? "bg-slate-100 text-slate-500"
                  : "bg-slate-50 text-slate-700"
            }">
              ${valStr}
            </span>
          </div>
        `;
      });
      flagsContent.innerHTML = html;
    }

    function renderRecommendations(recs) {
      if (!recs || typeof recs !== "object") {
        recsContent.innerHTML = `<p class="text-slate-500 text-sm">No recommendations in response.</p>`;
        return;
      }

      const notes = recs.notes_for_therapist || "";
      recsContent.innerHTML = `
        <div class="space-y-1 mb-3">
          <p><span class="font-medium">Partner share policy:</span> ${recs.partner_share_policy ?? "n/a"}</p>
          <p><span class="font-medium">Therapist share policy:</span> ${recs.therapist_share_policy ?? "n/a"}</p>
          <p><span class="font-medium">Suggested UI flow:</span> ${recs.suggested_ui_flow ?? "n/a"}</p>
          <p><span class="font-medium">Crisis banner:</span> ${recs.show_crisis_banner ? "Yes" : "No"}</p>
          <p><span class="font-medium">Show crisis resources:</span> ${recs.show_crisis_resources ? "Yes" : "No"}</p>
          <p><span class="font-medium">Mark as urgent for therapist:</span> ${recs.mark_as_urgent_for_therapist ? "Yes" : "No"}</p>
        </div>
        ${
          notes
            ? `<div class="mt-3">
                <p class="font-medium mb-1 text-sm">Notes for therapist:</p>
                <div class="text-xs bg-slate-50 border border-slate-200 rounded-xl p-2">
                  ${notes.replace(/\n/g, "<br>")}
                </div>
              </div>`
            : ""
        }
      `;
    }

    async function runSafetyCheck() {
      const entry = document.getElementById("entryText").value.trim();
      const userHash = document.getElementById("userHash").value.trim();
      const apiBase = apiBaseInput.value.trim().replace(/\/+$/, ""); // remove trailing slash

      errorBox.classList.add("hidden");
      errorBox.textContent = "";

      if (!entry) {
        errorBox.textContent = "Please enter some text before running the safety check.";
        errorBox.classList.remove("hidden");
        return;
      }

      setLoading(true);

      try {
        const url = apiBase + "/safety/analyze_entry";
        const payload = { entry_text: entry };
        if (userHash) payload.user_hash = userHash;

        const resp = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!resp.ok) {
          const text = await resp.text();
          throw new Error(`API error ${resp.status}: ${text}`);
        }

        const data = await resp.json();

        // Render sections
        renderSummary(data);
        renderFlags(data.flags || {});
        renderRecommendations(data.recommendations || {});
        rawJson.textContent = JSON.stringify(data, null, 2);
        detailsSection.classList.remove("hidden");
        rawSection.classList.remove("hidden");
      } catch (err) {
        errorBox.textContent = err.message || String(err);
        errorBox.classList.remove("hidden");
      } finally {
        setLoading(false);
      }
    }

    runButton.addEventListener("click", runSafetyCheck);

    toggleRawBtn.addEventListener("click", () => {
      if (rawJson.classList.contains("hidden")) {
        rawJson.classList.remove("hidden");
        toggleRawBtn.textContent = "Collapse";
      } else {
        rawJson.classList.add("hidden");
        toggleRawBtn.textContent = "Expand";
      }
    });
  </script>
</body>
</html>
